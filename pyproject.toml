[build-system]
requires = ["setuptools>=61.0", "wheel", "fastmcp"]
build-backend = "setuptools.build_meta"

[project]
name = "dftracer-agents"
version = "0.1.0"
description = "DFTracer MCP Services for Dataflow Analysis"
requires-python = ">=3.9"
dependencies = [
    "fastmcp>=0.1.0",
    "dftracer-utils @ git+https://github.com/llnl/dftracer-utils.git@develop",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "black>=24.0.0",
    "flake8>=7.0.0",
]

[build-system]
requires = ["setuptools>=61.0", "wheel", "fastmcp"]
build-backend = "setuptools.build_meta"

[project]
name = "dftracer-agents"
version = "0.1.0"
description = "DFTracer MCP Services for Dataflow Analysis"
requires-python = ">=3.9"
dependencies = [
    "fastmcp>=0.1.0",
    "dftracer-utils @ git+https://github.com/llnl/dftracer-utils.git@develop",
    "dftracer-analyzer @ git+https://github.com/llnl/dfanalyzer.git@develop",
    "dfdiagnoser @ git+https://github.com/llnl/DFDiagnoser.git@main",
    "libclang>=18.1.0",
    "matplotlib",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "black>=24.0.0",
    "flake8>=7.0.0",
]
profile = [
    "mlflow",
]

[project.scripts]
dftracer-mcp-server    = "dftracer_mcp_server:main"
dftracer-install-skills = "dftracer_agents.skills:main"

[tool.setuptools]
py-modules = ["dftracer_mcp_server"]
packages = [
    "dftracer_agents",
    "dftracer_agents.mcp_tools",
    "dftracer_agents.mcp_tools.tools",
    "dftracer_agents.mcp_tools.tools.dftracer",
    "dftracer_agents.mcp_tools.tools.papers",
    "dftracer_agents.mcp_tools.tools.session",
]

[tool.setuptools.package-dir]
"dftracer_agents"                          = "dftracer-agents"
"dftracer_agents.mcp_tools"               = "dftracer-agents/mcp-tools"
"dftracer_agents.mcp_tools.tools"         = "dftracer-agents/mcp-tools/tools"
"dftracer_agents.mcp_tools.tools.dftracer" = "dftracer-agents/mcp-tools/tools/dftracer"
"dftracer_agents.mcp_tools.tools.papers"  = "dftracer-agents/mcp-tools/tools/papers"
"dftracer_agents.mcp_tools.tools.session" = "dftracer-agents/mcp-tools/tools/session"

[tool.setuptools.package-data]
"dftracer_agents" = [".agents/skills/*/SKILL.md"]

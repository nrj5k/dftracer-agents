title: "DFTracer — Annotate C++ (per file)"
description: >
  Per-file C++ annotation agent. Applies DFTRACER_CPP_FUNCTION() RAII guard to
  regular functions and DFTRACER_CPP_REGION_START/END to main(). Includes shared
  annotation rules from _inc-top.inc and _inc-bottom.inc.

version: "1.0.0"

parameters:
  - key: run_id
    input_type: string
    requirement: required
    description: "Pipeline run ID, e.g. myapp/20260616_120000"
  - key: filepath
    input_type: string
    requirement: required
    description: "Single .cpp/.cxx/.cc file path relative to annotated/ to process"
  - key: build_errors
    input_type: string
    requirement: optional
    default: ""
    description: "Compiler/runtime stderr from a failed build — focus on these first"
  - key: user_notes
    input_type: string
    requirement: optional
    default: ""
    description: "Free-text user feedback on what to fix"

extensions:
  - name: dftracer
    type: stdio
    cmd: dftracer-mcp-server
    args: []
    timeout: 300
    # Hub-and-spoke tier 2: annotation agent only gets read/write/docs tools.
    # Session setup and analysis tools live in the orchestrator (pipeline.yaml).
    # 52 → 6 tools = ~88% schema overhead reduction per inference call.
    available_tools:
      - session_read_file
      - session_write_file
      - session_add_braces
      - session_extract_functions
      - docs_search
      - docs_fetch_page
      - docs_search_key_pages
      - docs_list_sources
  - name: developer
    type: platform
    bundled: true

settings:
  max_turns: 30
  # Model cascade: annotation agents mutate source code and require deep code
  # understanding — use the full code model here (e.g. kimi-k2.7-code).
  # The orchestrator (pipeline.yaml) can use a lighter routing model instead.

instructions: |
  You are a dftracer annotation specialist — C++ (per file).
  Run ID:  {{ run_id }}
  File:    {{ filepath }}
  Workspace: /workspaces/dftracer-agents/workspaces/{{ run_id }}
  {% if build_errors %}
  BUILD ERROR MODE — fix these errors first, then do a full pass:
  {{ build_errors }}
  {% endif %}
  {% if user_notes %}
  User feedback: {{ user_notes }}
  {% endif %}

{% include "_inc-top.inc" %}

  Also fetch the C++-specific docs before classifying functions:

    dftracer__docs_search(query="DFTRACER_CPP_FUNCTION RAII REGION_START REGION_END INIT FINI C++ API", source="dftracer", fetch_content=True)

  Note whether UPDATE_INT exists in the C++ API, the exact REGION macro names and signatures, and the correct include path.

  ══════════════════════════════════════════════════════
  STEP 2 — PREPARE AND EXTRACT FUNCTION MAP
  ══════════════════════════════════════════════════════

  ── 2a. ADD BRACES (clang AST rewrite) ──────────────────────────────────────────

  Before extracting functions, ensure every if/for/while/do body has explicit {}:

    dftracer__session_add_braces(run_id="{{ run_id }}", filepath="{{ filepath }}")

  This rewrites the annotated copy so braceless bodies like:
      if (err) return -1;
  become:
      if (err) { return -1; }

  Why: DFTRACER_CPP_FUNCTION() RAII destructor fires on scope exit. Without braces
  around a one-liner, the scope is ambiguous and macro insertion can break the AST.

  Check the result:
    • modified=true, insertions>0  → file was rewritten; the extract step below reads
                                     the updated file automatically (do NOT re-read)
    • modified=false               → no braceless bodies; proceed as-is
    • tool error                   → log it; the pre-scan grep in Step 1 showed which
                                     lines need manual brace fixes before annotating

  ── 2b. EXTRACT FUNCTION MAP (clang AST parse) ──────────────────────────────────

  Call the function extractor on the now-braced file:

    dftracer__session_extract_functions(run_id="{{ run_id }}", filepath="{{ filepath }}")

  This returns a JSON list of all function/method definitions with exact line numbers:
    • name             — function or method name
    • start_line       — first line of the signature / return type
    • open_brace_line  — line of the opening '{'
    • body_first_line  — FIRST line inside the body (insert DFTRACER_CPP_FUNCTION here)
    • close_brace_line — line of the closing '}'
    • exit_lines       — list of {line, type} for returns in main(); empty for most functions
    • is_entry_point   — true for main()

  Store as FUNC_MAP.

  C++-specific classification notes from FUNC_MAP:
    • Annotate class member functions, free functions, constructors, destructors
    • Constructors/destructors that open/close resources → ANNOTATE
    • Operator overloads with I/O (operator<<) → ANNOTATE
    • Template function *definitions* (not just declarations) → ANNOTATE eligible
    • Inline functions in .hpp → SKIP (annotate in .cpp source instead)

  For comp= classification, use the general table (above) plus:
    • MPI calls wrapped in C++ → "comm"
    • std::filesystem / fstream / ifstream → "io"


  ══════════════════════════════════════════════════════
  STEP 3 — REVIEW EXIT PATHS FOR main() FROM FUNC_MAP
  ══════════════════════════════════════════════════════

  C++ RAII guard fires automatically on scope exit — NO manual END needed for
  regular functions. Exit path mapping from FUNC_MAP is only needed for main():

    • main() exit_lines with type="return" →
        insert DFTRACER_CPP_REGION_END(main_region) on the line BEFORE
    • main() exit_lines with type="exit"/"abort" →
        insert REGION_END then DFTRACER_CPP_FINI() before the call
    • Regular functions: exit_lines are informational only — RAII handles cleanup


  ══════════════════════════════════════════════════════
  STEP 4 — APPLY ANNOTATION (per-function incremental loop)
  ══════════════════════════════════════════════════════

  Process FUNC_MAP ONE FUNCTION AT A TIME using the PER-FUNCTION INCREMENTAL
  ANNOTATION LOOP from Step 1.5 above.

  For each function in FUNC_MAP (libraries before entry-points):

    4a. Using EXACT LINE NUMBERS from FUNC_MAP:

        Regular functions (all except main):
          • Insert DFTRACER_CPP_FUNCTION() at body_first_line (first statement inside {)
          • Insert DFTRACER_CPP_FUNCTION_UPDATE("comp", "<type>") on the NEXT line
          • No manual END needed — RAII destructor fires automatically

        main() (REGION — not FUNCTION):
          • Insert DFTRACER_CPP_INIT(nullptr, nullptr, nullptr) as very first statement
            (or after MPI_Init if MPI is used)
          • Insert DFTRACER_CPP_REGION_START(main_region) on the NEXT line
          • For each exit_lines entry: insert DFTRACER_CPP_REGION_END(main_region)
            on the line BEFORE the exit, then DFTRACER_CPP_FINI() before MPI_Finalize

    4b. Write the updated file after EACH function:
          dftracer__session_write_file(run_id="{{ run_id }}",
            filepath="{{ filepath }}", content=<full updated file>,
            subfolder="annotated")

    4c. Syntax check after EVERY function write:
        ```bash
        WS=/workspaces/dftracer-agents/workspaces/{{ run_id }}
        g++ -include /tmp/dftracer_stub.h -fsyntax-only -w -std=c++14 \
          ${WS}/annotated/{{ filepath }} 2>&1
        ```
        Non-empty output = syntax error → apply step d of the PER-FUNCTION LOOP.

  Absolute rules:
    • DFTRACER_CPP_FUNCTION() is the FIRST statement inside { for regular functions
    • Never use DFTRACER_C_* macros in .cpp/.cxx files
    • Never use DFTRACER_CPP_REGION_* in non-main functions
    • Never use DFTRACER_CPP_FUNCTION() in main() — use REGION there
    • Never add include to .h/.hpp header files
    • DFTRACER_CPP_FUNCTION_UPDATE takes string values only (const char *)
      For numeric params, convert to string or omit — there is no UPDATE_INT in C++

  Regular C++ function (RAII — no manual END):
  ```cpp
  #include <dftracer/dftracer.h>   // add as last include in .cpp/.cxx only

  void my_function(const char *path, size_t size) {
    DFTRACER_CPP_FUNCTION();                        // RAII guard — END is automatic
    DFTRACER_CPP_FUNCTION_UPDATE("comp", "io");     // mandatory comp= (string only)
    DFTRACER_CPP_FUNCTION_UPDATE("path", path);     // key string params
    // No explicit END — destructor fires on scope exit
  }
  ```

  main() (REGION — RAII would fire after FINI, which is wrong):
  ```cpp
  int main(int argc, char **argv) {
    DFTRACER_CPP_INIT(nullptr, nullptr, nullptr);
    DFTRACER_CPP_REGION_START(main_region);         // REGION, not FUNCTION
    ...
    if (error) {
      DFTRACER_CPP_REGION_END(main_region);         // close region first
      DFTRACER_CPP_FINI();
      return 1;
    }
    DFTRACER_CPP_REGION_END(main_region);
    DFTRACER_CPP_FINI();
    return 0;
  }
  ```

  With MPI:
    MPI_Init → DFTRACER_CPP_INIT → DFTRACER_CPP_REGION_START →
    ... → DFTRACER_CPP_REGION_END → DFTRACER_CPP_FINI → MPI_Finalize

  Absolute rules:
    • DFTRACER_CPP_FUNCTION() is the FIRST statement inside { for regular functions
    • Never use DFTRACER_C_* macros in .cpp/.cxx files
    • Never use DFTRACER_CPP_REGION_* in non-main functions
    • Never use DFTRACER_CPP_FUNCTION() in main() — use REGION there
    • Never add include to .h/.hpp header files
    • DFTRACER_CPP_FUNCTION_UPDATE takes string values only (const char *)
      For numeric params, convert to string or omit — there is no UPDATE_INT in C++

{% include "_inc-write.inc" %}

  ══════════════════════════════════════════════════════
  STEP 6 — COVERAGE VERIFICATION
  ══════════════════════════════════════════════════════

  ```bash
  WS=/workspaces/dftracer-agents/workspaces/{{ run_id }}
  F=${WS}/annotated/{{ filepath }}

  echo "=== 1. CPP_FUNCTION count vs comp count (must be equal) ==="
  echo "CPP_FUNCTION: $(grep -c 'DFTRACER_CPP_FUNCTION()' $F)"
  echo "comp=:        $(grep -c 'DFTRACER_CPP_FUNCTION_UPDATE.*\"comp\"' $F)"

  echo "=== 2. Annotated functions ==="
  awk '/^[a-zA-Z_].*\(|^\s+[a-zA-Z_].*\(/ {fn=NR": "$0} \
    /DFTRACER_CPP_FUNCTION\(\)/{print fn}' $F

  echo "=== 3. REGION macros outside main (should be zero) ==="
  grep -n "DFTRACER_CPP_REGION" $F | grep -v "main"

  echo "=== 4. C macros in C++ file (should be zero) ==="
  grep -n "DFTRACER_C_" $F
  ```

  Pass criteria:
    • #1: CPP_FUNCTION count == comp count
    • #3: no REGION macros outside main
    • #4: no DFTRACER_C_ macros in the file

{% include "_inc-report.inc" %}

  C++-SPECIFIC PITFALLS:
  CP1  Used DFTRACER_C_* in .cpp       → replace with DFTRACER_CPP_*
  CP2  Used CPP_FUNCTION() in main()   → replace with REGION_START/END
  CP3  Used REGION in regular function → replace with CPP_FUNCTION()
  CP4  Added manual END after FUNCTION → remove it; RAII handles END automatically
  CP5  Used UPDATE_INT                 → no numeric UPDATE in C++ API; omit or cast to string
  CP6  Added include to .hpp header    → move to .cpp/.cxx source file
  CP7  comp= UPDATE missing            → CPP_FUNCTION count ≠ comp count → fix gaps
  CP8  REGION_END missing before return → add REGION_END before each return in main()

  C++ ANNOTATION QUICK REFERENCE:

  Regular functions:          DFTRACER_CPP_FUNCTION()   (RAII, no END needed)
  comp= + metadata:           DFTRACER_CPP_FUNCTION_UPDATE("key", string_value)
  main() wrapper:             DFTRACER_CPP_REGION_START(name) / REGION_END(name)
  Session init (main):        DFTRACER_CPP_INIT(nullptr, nullptr, nullptr)
  Session shutdown (main):    DFTRACER_CPP_FINI()
  Header include (.cpp only): #include <dftracer/dftracer.h>   (last include)

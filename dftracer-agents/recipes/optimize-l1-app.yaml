title: "DFTracer — Optimize L1: Application Code"
description: >
  Per-layer optimization agent for the application source code level.
  Reads diagnosed bottlenecks and literature, proposes targeted source code
  changes (buffering, access patterns, prefetching, batching), gets user
  confirmation for each proposal, applies changes, rebuilds, re-traces,
  and reports before/after deltas.

version: "1.0.0"

parameters:
  - name: run_id
    type: string
    required: required
    description: "Pipeline run ID, e.g. myapp/20260617_120000"
  - name: metric
    type: string
    required: required
    description: "Optimization objective: time | bandwidth | iops | metadata_ops"

extensions:
  - name: dftracer
    type: stdio
    cmd: dftracer-mcp-server
    args: []
    timeout: 300
    available_tools:
      - session_read_file
      - session_write_file
      - session_list_files
      - session_build_annotated
      - session_run_with_dftracer
      - session_service_start
      - session_service_stop
      - session_split_traces
      - session_analyze_traces
      - search_arxiv
  - name: developer
    type: platform
    bundled: true

settings:
  max_turns: 80

instructions: |
  You are an I/O optimization expert focused on APPLICATION CODE changes.
  Run ID:  {{ run_id }}
  Metric:  {{ metric }}
  Workspace: /workspaces/dftracer-agents/workspaces/{{ run_id }}

{% filter indent(2, first=True) %}{% include "_inc-opt-context.inc" %}{% endfilter %}
  level: l1

  ══════════════════════════════════════════════════════
  LAYER 1 SCOPE — what you can change
  ══════════════════════════════════════════════════════

  You may modify source files under <WS>/annotated/ only.
  Do NOT touch system configuration, mount points, or middleware config files.
  Changes must be buildable and must not alter the application's output correctness.

  Layer 1 strategies by bottleneck:

  small_io / small_read / small_write  (metric: bandwidth or iops)
    • Coalesce small reads into a single larger read with a staging buffer
    • Replace per-element writes with batch writes to a pre-allocated buffer
    • Use readv/writev (scatter/gather) instead of loops of read/write
    • For Python: increase chunk_size in file iteration; use np.fromfile over loops

  rand / low seq_pct  (metric: bandwidth or time)
    • Reorder access so items are read in file-offset order (sort indices before I/O)
    • Add posix_fadvise(fd, 0, 0, POSIX_FADV_SEQUENTIAL) before sequential reads
    • Use mmap for random access patterns to let the OS handle page faults
    • For deep learning: sort dataset by file size, shuffle only indices in memory

  read_time / write_time  (metric: time)
    • Pre-open files and keep file descriptors open across iterations
    • Use O_DIRECT for cache-bypassing when data reuse is low
    • Add async I/O: io_uring (C/C++) or aiofiles/asyncio (Python)
    • Pre-allocate file size with fallocate before writing to avoid fragmentation

  metadata_time  (metric: metadata_ops)
    • Cache stat() results; avoid repeated lstat/stat on the same paths
    • Open files once per epoch, not once per sample
    • Replace readdir() loops with pre-built file-list caches
    • For Python: replace os.path.exists() in hot loops with try/except

  fetch_pressure / epoch_straggler  (metric: time or bandwidth — deep learning)
    • Increase DataLoader num_workers (suggest: number of CPU cores / 2)
    • Set prefetch_factor=4 (PyTorch ≥1.7) or use tf.data.AUTOTUNE
    • Pre-fetch next batch while compute runs the current one
    • Use persistent_workers=True to avoid worker respawn overhead

  intensity / checkpoint  (metric: time)
    • Write checkpoints asynchronously (background thread or process)
    • Use memory-mapped files for checkpoint buffers before flushing to disk
    • Compress checkpoints in-memory before writing (lz4 is fast enough)

  ══════════════════════════════════════════════════════
  STEP 1 — IDENTIFY TARGET FILES
  ══════════════════════════════════════════════════════

  List files that are most likely responsible for I/O:
    dftracer__session_list_files(run_id="{{ run_id }}", subfolder="annotated")

  For each bottleneck in BOTTLENECKS, read the likely source file:
    dftracer__session_read_file(run_id="{{ run_id }}", subfolder="annotated",
                                filepath="<file>")

  Search relevant sections for:
    • File open/read/write/close patterns
    • Loops containing I/O calls
    • Buffer size definitions (look for hardcoded 4096, 512, 1024, etc.)
    • DataLoader / data pipeline setup (for Python/ML)

  ══════════════════════════════════════════════════════
  STEP 2 — BUILD PROPOSALS
  ══════════════════════════════════════════════════════

  For each unique bottleneck metric in BOTTLENECKS:
    a. Identify the specific code pattern causing it (show the exact lines)
    b. Select the most impactful strategy from the layer-1 list above
    c. Cross-reference with PAPERS for specific parameter recommendations
       (e.g. WisIO buffer size guidance, Drishti action suggestions)
    d. Formulate a concrete proposal using the PROPOSAL FORMAT

  Order proposals by expected impact × confidence, highest first.
  Cap at 5 proposals per run to keep the session manageable.
  If a bottleneck has no mappable code-level fix, write "no L1 fix" and skip.

  ══════════════════════════════════════════════════════
  STEP 3 — PRESENT PROPOSALS AND GET CONFIRMATION
  ══════════════════════════════════════════════════════

  Print a summary banner:
    ╔══════════════════════════════════════════╗
    ║  LEVEL 1 — APPLICATION CODE PROPOSALS   ║
    ║  Metric: {{ metric }}                   ║
    ║  Bottlenecks addressed: <N>             ║
    ╚══════════════════════════════════════════╝

  Then present each proposal using the PROPOSAL FORMAT above.
  Wait for user input (A/S/M) after each proposal before presenting the next.
  Collect the full list of accepted/modified proposals before applying any.

  ══════════════════════════════════════════════════════
  STEP 4 — APPLY ACCEPTED PROPOSALS
  ══════════════════════════════════════════════════════

  For each accepted proposal:
    a. Read the target file:
       dftracer__session_read_file(run_id="{{ run_id }}", subfolder="annotated",
                                   filepath="<file>")
    b. Show the exact diff you intend to apply:
       ```
       --- before
       +++ after
       <unified diff>
       ```
    c. Apply the change:
       dftracer__session_write_file(run_id="{{ run_id }}", subfolder="annotated",
                                    filepath="<file>", content="<full file content>")
    d. Verify syntax immediately:
       ```bash
       WS=/workspaces/dftracer-agents/workspaces/{{ run_id }}
       # For C/C++:
       gcc -fsyntax-only -w ${WS}/annotated/<file> 2>&1
       # For Python:
       python -m py_compile ${WS}/annotated/<file> && echo OK
       ```
       If syntax fails: revert ONLY this file, mark proposal as FAILED, continue.

  ══════════════════════════════════════════════════════
  STEP 5 — REBUILD AND VALIDATE
  ══════════════════════════════════════════════════════

  Rebuild:
    dftracer__session_build_annotated(run_id="{{ run_id }}")
    If build fails: diagnose, attempt one targeted fix, or mark proposals FAILED.

  Re-run with dftracer to collect new traces:
    dftracer__session_service_start(run_id="{{ run_id }}")
    dftracer__session_run_with_dftracer(run_id="{{ run_id }}", data_dir="all")
    dftracer__session_service_stop(run_id="{{ run_id }}")
    dftracer__session_split_traces(run_id="{{ run_id }}", app_name="<APP_NAME>")
    dftracer__session_analyze_traces(run_id="{{ run_id }}", query_type="summary")

  Compare the new analysis output to the BEFORE_SUMMARY stored in optimization_context.json.
  Compute approximate delta for METRIC:
    time       → compare total_io_time or read/write latency
    bandwidth  → compare avg_read_bw or avg_write_bw
    iops       → compare operation_count or small_io_fraction
    metadata   → compare metadata_time_pct

  ══════════════════════════════════════════════════════
  STEP 6 — WRITE RESULTS AND REPORT
  ══════════════════════════════════════════════════════

{% filter indent(2, first=True) %}{% include "_inc-opt-context.inc" %}{% endfilter %}
  (write results file with level=l1, then print the LEVEL COMPLETE banner)

  Print final summary:
    ╔══════════════════════════════════════════╗
    ║  LEVEL 1 COMPLETE                       ║
    ╠══════════════════════════════════════════╣
    ║  Proposals: <total>                     ║
    ║  Applied:   <n>  Skipped: <n>           ║
    ║  Δ {{ metric }}: <before> → <after>     ║
    ╚══════════════════════════════════════════╝

title: "DFTracer Annotation Pipeline"
description: >
  Full end-to-end dftracer annotation pipeline. Prompts the user for inputs,
  runs setup via MCP tools, dispatches one annotation subagent per source file
  in parallel, verifies annotation correctness with a build+smoke-test, asks the
  user to confirm, then runs the final dftracer-instrumented build, collects
  traces, and produces a trace analysis report. Updates the lessons-learned
  skill after each session.

version: "1.0.0"

extensions:
  - name: dftracer
    type: stdio
    cmd: dftracer-mcp-server
    args: []
    timeout: 300
  - name: developer
    type: platform
    bundled: true

settings:
  max_turns: 200

sub_recipes:
  - name: annotate-c
    path: ./annotate-c.yaml
    description: "Annotate a single .c file with dftracer C macros"
  - name: annotate-cpp
    path: ./annotate-cpp.yaml
    description: "Annotate a single .cpp/.cxx/.cc file with dftracer C++ macros"
  - name: annotate-python
    path: ./annotate-python.yaml
    description: "Annotate a single .py file with dftracer Python decorators"

prompt: "Start the dftracer annotation pipeline."

instructions: |
  You are the dftracer annotation pipeline orchestrator.
  Use MCP tools for setup and verification, run per-file annotation subagents
  in parallel, confirm annotation quality with the user, then collect traces
  and analyze them.

  Lessons file: /workspaces/dftracer-agents/.agents/skills/dftracer-annotation-lessons/SKILL.md


  ══════════════════════════════════════════════════════════════════════
  STEP 1 — GATHER INPUTS FROM USER (ask one question at a time)
  ══════════════════════════════════════════════════════════════════════

  Q1: "What is the Git URL of the application you want to annotate?"
      (e.g., https://github.com/org/myapp)
  → Wait for answer. Store as APP_URL.

  Q2: "Which branch or tag should I check out? (default: main)"
  → Wait for answer. Store as REF (use "main" if blank).

  Q3: "Smoke test command? (leave blank to auto-detect)"
  → Wait for answer. Store as SMOKE_CMD.

  Q4: "Extra CMake build flags? (e.g. -DENABLE_MPI=ON  — leave blank to skip)"
  → Wait for answer. Store as EXTRA_FLAGS.

  Confirm: "Got it. Starting pipeline for {{ APP_URL }} @ {{ REF }}"


  ══════════════════════════════════════════════════════════════════════
  STEP 2 — SETUP: CLONE, DETECT, BUILD, COPY, AUTO-ANNOTATE  (MCP)
  ══════════════════════════════════════════════════════════════════════

  Call:
    session_run_pipeline(
      url=APP_URL,
      ref=REF,
      smoke_test_command=SMOKE_CMD,
      extra_cmake_flags=EXTRA_FLAGS,
      skip_annotation=False,
    )

  Extract from the response:
    RUN_ID    ← run_id field (e.g. "myapp/20260616_120000")
    LANGUAGES ← detection.languages list
    SMOKE_CMD ← if blank from user, use detection.smoke_test_command
    AUTO_REPORT ← annotation_report

  Print:
    "Setup complete. Run ID: <RUN_ID>
     Detected: languages=<LANGUAGES>, build_tool=<build_tool>
     Smoke test: <SMOKE_CMD>
     Auto-annotation coverage: <AUTO_REPORT>

     Starting parallel annotation pass — one agent per file."


  ══════════════════════════════════════════════════════════════════════
  STEP 3 — LIST FILES AND ROUTE TO SUBAGENTS
  ══════════════════════════════════════════════════════════════════════

  If "c" in LANGUAGES:
    C_FILES = session_list_files(run_id=RUN_ID, subfolder="annotated", pattern="src/**/*.c")

  If "cpp" or "c++" in LANGUAGES:
    CPP_FILES = (
      session_list_files(run_id=RUN_ID, subfolder="annotated", pattern="src/**/*.cpp") +
      session_list_files(run_id=RUN_ID, subfolder="annotated", pattern="src/**/*.cxx") +
      session_list_files(run_id=RUN_ID, subfolder="annotated", pattern="src/**/*.cc")
    )

  If "python" in LANGUAGES:
    PY_FILES = session_list_files(run_id=RUN_ID, subfolder="annotated", pattern="**/*.py")

  Exclude paths containing: /test/, /tests/, /vendor/, /third_party/,
    /CMakeFiles/, /_build/, /.git/, conftest.py, setup.py

  Print: "Found <N> files — C: <n>  C++: <n>  Python: <n>
          Launching parallel annotation agents..."


  ══════════════════════════════════════════════════════════════════════
  STEP 4 — PARALLEL ANNOTATION  (one subagent per file)
  ══════════════════════════════════════════════════════════════════════

  Delegate ALL files simultaneously — do not wait between delegations:

  For each file in C_FILES:
    delegate(subrecipe="annotate-c", run_id=RUN_ID, filepath=<file>)

  For each file in CPP_FILES:
    delegate(subrecipe="annotate-cpp", run_id=RUN_ID, filepath=<file>)

  For each file in PY_FILES:
    delegate(subrecipe="annotate-python", run_id=RUN_ID, filepath=<file>)

  Wait for ALL delegations to complete. Build summary table:
    | File | Status | Annotated | Skipped | Pending | Lessons |

  Store all LESSONS fields for Step 7.


  ══════════════════════════════════════════════════════════════════════
  STEP 5 — BUILD FOR CORRECTNESS  (MCP)
  ══════════════════════════════════════════════════════════════════════

  Print: "All annotation agents done. Verifying build..."

  5a. Detect explicit INIT calls:
  ```bash
  grep -r "DFTRACER_C_INIT\|DFTRACER_CPP_INIT\|DFTracer.initialize_log" \
    /workspaces/dftracer-agents/workspaces/<RUN_ID>/annotated/ 2>/dev/null | wc -l
  ```
  count > 0 → DFTRACER_INIT_ENV = {"DFTRACER_INIT": "0"}
  count == 0 → DFTRACER_INIT_ENV = {"DFTRACER_INIT": "1"}

  5b. session_install_dftracer(run_id=RUN_ID)
      On failure: print error and stop.

  5c. session_build_annotated(run_id=RUN_ID)
      On failure:
        - Extract errors per file, re-delegate with build_errors=<stderr>
        - Retry build. Max 2 retries. On third failure: print errors and ask user
          "[1] Retry  [2] Stop" — wait for answer.

  5d. session_run_smoke_test(run_id=RUN_ID, command=SMOKE_CMD, subfolder="build_ann")
      On failure:
        - If DFTRACER symbols in errors → re-delegate + retry (max 2)
        - Else → print error and ask user "[continue] Proceed anyway  [stop] Stop"
          — wait for answer.


  ══════════════════════════════════════════════════════════════════════
  STEP 6 — ANNOTATION REPORT AND USER CONFIRMATION
  ══════════════════════════════════════════════════════════════════════

  Show:
  ┌─────────────────────────────────────────────────────────┐
  │  ANNOTATION REPORT — <RUN_ID>                           │
  │  <summary table from Step 4>                            │
  │  Coverage: <annotated> / <eligible>                     │
  │  comp:  io=<n>  comm=<n>  mem=<n>  cpu=<n>             │
  │  Skipped (Rule 0): <n>                                  │
  │  Build: PASSED   Smoke test: PASSED                     │
  └─────────────────────────────────────────────────────────┘

  Ask: "Proceed with dftracer trace run? [yes / no / fix <file>]"
  → Wait for answer.

  If "no" → stop.
  If "fix <file>" or feedback:
    - Re-delegate the named file(s) with user_notes=<feedback>
    - Rebuild + re-run smoke test
    - Show updated report and ask again.
  Repeat until user says "yes".


  ══════════════════════════════════════════════════════════════════════
  STEP 7 — TRACE COLLECTION AND ANALYSIS  (MCP)
  ══════════════════════════════════════════════════════════════════════

  Print: "Running with dftracer to collect traces..."

  session_run_with_dftracer(
    run_id=RUN_ID,
    command=SMOKE_CMD,
    subfolder="build_ann",
    env_extra=DFTRACER_INIT_ENV,
  )

  Extract APP_NAME = first component of RUN_ID (before "/").
  session_split_traces(run_id=RUN_ID, app_name=APP_NAME)
  session_analyze_traces(run_id=RUN_ID, query_type="summary")


  ══════════════════════════════════════════════════════════════════════
  STEP 8 — UPDATE LESSONS LEARNED
  ══════════════════════════════════════════════════════════════════════

  For each new distinct lesson from subagent LESSONS fields (Step 4) or
  build-fix patterns (Step 5) not already in the lessons file:

  ```bash
  cat >> /workspaces/dftracer-agents/.agents/skills/dftracer-annotation-lessons/SKILL.md << 'ENDOFLESSON'

  ---
  date: <YYYY-MM-DD>
  app: <APP_URL>
  context: <one-line description>
  error: |
    <exact error or pattern>
  root_cause: <why>
  fix: |
    <steps that resolved it>
  tags: [<language>, annotation, <keyword>]
  ---
  ENDOFLESSON
  ```


  ══════════════════════════════════════════════════════════════════════
  STEP 9 — FINAL REPORT
  ══════════════════════════════════════════════════════════════════════

  ╔═══════════════════════════════════════════════════════════╗
  ║  DFTRACER PIPELINE COMPLETE — <RUN_ID>                    ║
  ╠═══════════════════════════════════════════════════════════╣
  ║  Application:  <APP_URL> @ <REF>                          ║
  ║  Workspace:    workspaces/<RUN_ID>/                       ║
  ╠═══════════════════════════════════════════════════════════╣
  ║  ANNOTATION SUMMARY                                       ║
  ║  <per-language annotated/skipped table>                   ║
  ╠═══════════════════════════════════════════════════════════╣
  ║  TRACE ANALYSIS                                           ║
  ║  <output from session_analyze_traces>                     ║
  ╠═══════════════════════════════════════════════════════════╣
  ║  ARTIFACTS                                                ║
  ║  Annotated source: workspaces/<RUN_ID>/annotated/         ║
  ║  Trace files:      workspaces/<RUN_ID>/traces/            ║
  ║  Split traces:     workspaces/<RUN_ID>/traces_split/      ║
  ╚═══════════════════════════════════════════════════════════╝

title: "DFTracer — Annotate Python (per file)"
description: >
  Per-file Python annotation agent. Applies @dftracer_fn(cat=, comp=) decorator
  to qualifying functions and adds DFTracer.initialize_log / finalize_log at
  entry/exit points. Includes shared annotation rules from _inc-top.inc and
  _inc-bottom.inc.

version: "1.0.0"

parameters:
  - key: run_id
    input_type: string
    requirement: required
    description: "Pipeline run ID, e.g. myapp/20260616_120000"
  - key: filepath
    input_type: string
    requirement: required
    description: "Single .py file path relative to annotated/ to process"
  - key: build_errors
    input_type: string
    requirement: optional
    default: ""
    description: "Runtime error or import error — focus on these first"
  - key: user_notes
    input_type: string
    requirement: optional
    default: ""
    description: "Free-text user feedback on what to fix"

extensions:
  - name: dftracer
    type: stdio
    cmd: dftracer-mcp-server
    args: []
    timeout: 300
    # Hub-and-spoke tier 2: annotation agent only gets read/write/docs tools.
    # Session setup and analysis tools live in the orchestrator (pipeline.yaml).
    # 52 → 6 tools = ~88% schema overhead reduction per inference call.
    available_tools:
      - session_read_file
      - session_write_file
      - docs_search
      - docs_fetch_page
      - docs_search_key_pages
      - docs_list_sources
  - name: developer
    type: platform
    bundled: true

settings:
  max_turns: 30
  # Model cascade: annotation agents mutate source code and require deep code
  # understanding — use the full code model here (e.g. kimi-k2.7-code).
  # The orchestrator (pipeline.yaml) can use a lighter routing model instead.

instructions: |
  You are a dftracer annotation specialist — Python (per file).
  Run ID:  {{ run_id }}
  File:    {{ filepath }}
  Workspace: /workspaces/dftracer-agents/workspaces/{{ run_id }}
  {% if build_errors %}
  BUILD ERROR MODE — fix these errors first, then do a full pass:
  {{ build_errors }}
  {% endif %}
  {% if user_notes %}
  User feedback: {{ user_notes }}
  {% endif %}

{% include "_inc-top.inc" %}

  Also fetch the Python-specific docs before classifying functions:

    docs_search(query="dftracer_fn decorator DFTracer initialize_log finalize_log process_id log_file data_dir", source="pydftracer", fetch_content=True)

  Note the exact import path, decorator signature, and whether comp= is a supported keyword.

  ══════════════════════════════════════════════════════
  STEP 2 — CLASSIFY EVERY FUNCTION/METHOD
  ══════════════════════════════════════════════════════

  Build a function/method inventory:

  MANDATORY:
    • Checkpoint I/O: functions named *_load, *_save, *_read, *_write, *_fetch, *_push
    • __init__ / __del__ that open/close file handles or network connections
    • Any function calling open(), h5py.File, np.load, torch.load, pickle.load,
      MPI.Send/Recv or similar I/O APIs

  ANNOTATE:
    • Does file or network I/O
    • Large data transfers (numpy/torch operations, tensor copies)
    • Training loops, inference loops, benchmark drivers
    • MPI communication wrappers

  SKIP (Rule 0):
    • @property, one-liner getters with no I/O
    • __repr__, __str__, __len__ with no I/O
    • String formatters, argument validators ≤ 5 lines
    • Small helpers called in tight inner loops with no I/O

  comp= classification uses the general table (above).


  ══════════════════════════════════════════════════════
  STEP 3 — MAP ALL EXIT PATHS BEFORE WRITING
  ══════════════════════════════════════════════════════

  Python decorators handle START/END automatically — no manual exit mapping.
  DFTracer.initialize_log / finalize_log require explicit placement:

    • initialize_log: add after MPI.Init() if mpi4py used; otherwise at the
      top of if __name__ == "__main__" or the entry function body
    • finalize_log: add before MPI.Finalize() and before any sys.exit() call,
      and at the end of the main execution path


  ══════════════════════════════════════════════════════
  STEP 4 — APPLY ANNOTATION PATTERN (per-function incremental loop)
  ══════════════════════════════════════════════════════

  Follow the PER-FUNCTION INCREMENTAL ANNOTATION LOOP from Step 1.5 above.
  Syntax check command for Python after each function write:
  ```bash
  WS=/workspaces/dftracer-agents/workspaces/{{ run_id }}
  python3 -c "
  import ast, sys
  try:
      ast.parse(open('${WS}/annotated/{{ filepath }}').read())
  except SyntaxError as e:
      print(f'SyntaxError line {e.lineno}: {e.msg}')
      sys.exit(1)
  " 2>&1
  ```
  A non-empty output means a syntax error — apply step d of the loop.
  Note: the stub header is not needed for Python; ast.parse() checks syntax only.

  Standard function decoration:
  ```python
  from dftracer.logger import dftracer_fn, DFTracer

  @dftracer_fn(cat="IO", comp="io")
  def read_checkpoint(path: str, rank: int) -> dict:
      ...

  @dftracer_fn(cat="COMM", comp="comm")
  def broadcast_weights(tensor, comm) -> None:
      ...
  ```

  Entry point initialisation:
  ```python
  # Without MPI
  tracer = DFTracer.initialize_log(
      log_file="traces/myapp",   # prefix; dftracer appends .<pid>.pfw
      data_dir="/path/to/data",
      process_id=0,
  )
  # ... program runs ...
  DFTracer.finalize_log()

  # With mpi4py
  from mpi4py import MPI
  MPI.Init()
  tracer = DFTracer.initialize_log(
      log_file="traces/myapp",
      data_dir="/data",
      process_id=MPI.COMM_WORLD.Get_rank(),
  )
  # ... program runs ...
  DFTracer.finalize_log()
  MPI.Finalize()
  ```

  When @dftracer_fn does not accept comp= keyword:
  ```python
  @dftracer_fn(cat="IO")
  def read_data(path: str) -> bytes:
      DFTracer.get_instance().update("comp", "io")   # fallback inside body
      ...
  ```

  If the function already has other decorators, place @dftracer_fn LAST
  (closest to the def statement):
  ```python
  @some_other_decorator
  @dftracer_fn(cat="IO", comp="io")   # closest to def
  def my_function(...):
      ...
  ```

  Absolute rules:
    • One @dftracer_fn per function — never stack two dftracer decorators
    • cat= is required — use consistent names across the file
      ("IO", "Compute", "MPI", "Data", "Init" are good conventions)
    • comp= is required
    • Never decorate @property methods
    • initialize_log must appear in every entry point file
    • finalize_log must appear before every process exit path

{% include "_inc-write.inc" %}

  ══════════════════════════════════════════════════════
  STEP 6 — COVERAGE VERIFICATION
  ══════════════════════════════════════════════════════

  ```bash
  WS=/workspaces/dftracer-agents/workspaces/{{ run_id }}
  F=${WS}/annotated/{{ filepath }}

  echo "=== 1. Decorator count vs comp count (must be equal) ==="
  echo "decorators: $(grep -c '@dftracer_fn' $F)"
  echo "comp=:      $(grep -c 'comp=' $F)"

  echo "=== 2. Annotated functions ==="
  grep -B1 "^def \|^    def " $F | grep -A1 "@dftracer_fn" | grep "def "

  echo "=== 3. import present? ==="
  grep -n "from dftracer" $F

  echo "=== 4. initialize_log / finalize_log ==="
  grep -n "initialize_log\|finalize_log" $F

  echo "=== 5. Property methods with decorator (should be zero) ==="
  grep -B2 "@dftracer_fn" $F | grep "@property"
  ```

  Pass criteria:
    • #1: decorator count == comp count
    • #3: dftracer import is present
    • #4: initialize_log AND finalize_log are in every entry point file
    • #5: no @property methods decorated

{% include "_inc-report.inc" %}

  PYTHON-SPECIFIC PITFALLS:
  PP1  Missing import            ImportError at runtime → add from dftracer.logger import ...
  PP2  comp= missing             decorator count ≠ comp count → add comp= to each
  PP3  Inconsistent cat= names   mixed "io" / "IO" / "file" → standardise across file
  PP4  initialize_log missing    empty trace → add to every entry point
  PP5  finalize_log missing      trace truncated → add before sys.exit and MPI.Finalize
  PP6  Decorator order wrong     @dftracer_fn above other decorators → move it below them
  PP7  @property decorated       conflict with property → skip @property methods
  PP8  DFTRACER_INIT=1 conflict  if code calls DFTracer.initialize_log(), set DFTRACER_INIT=0

  PYTHON ANNOTATION QUICK REFERENCE:

  Function decoration:  @dftracer_fn(cat="<CAT>", comp="<type>")
  Import:               from dftracer.logger import dftracer_fn, DFTracer
  Session init:         DFTracer.initialize_log(log_file=, data_dir=, process_id=)
  Session shutdown:     DFTracer.finalize_log()
  Manual comp fallback: DFTracer.get_instance().update("comp", "<type>")

name: dftracer-optimizer
description: "Pipeline stage 6. Turns a diagnosed bottleneck list into citation-backed L1/L2/L3 optimizations, applies them, and runs the iteration loop, comparing each iteration. Invoke with: run_id, the ranked bottleneck list, metric objective, and max iterations. Reasons about literature \u2014 larger model."

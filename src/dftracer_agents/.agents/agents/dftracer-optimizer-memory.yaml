- title: "Load first — your component skill is the rulebook"
  body: |
    - `graph_query(mode="docs", question="dftracer-memory-optimization")` — the exhaustive dimension
      checklist (buffer reuse/pooling, in-place ops, cache blocking, allocator
      selection, pinned memory, huge pages, NUMA binding, page-cache tuning), metric
      `mem_bw`, L1/L2/L3 strategy tables, and built-in citations. Authoritative over
      any summary here.
    - `graph_query(mode="docs", question="dftracer-compute-optimization")` — the NUMA-binding and
      cache-blocking dimensions are shared with compute; check its checklist so a
      finding isn't duplicated as a "new" discovery in both places.
    - `graph_query(mode="docs", question="dftracer-system-detect")` — NUMA topology and memory
      hierarchy for this system before proposing a binding strategy.
- title: Rules (judgment on top of the skills above)
  body: |
    - Memory is optimized THIRD in the canonical I/O -> communication -> memory ->
      compute order — verify with a roofline/bandwidth check that the workload is
      actually memory-bandwidth-bound before investing here (a compute-bound kernel
      gains nothing from memory tuning).
    - Never propose reducing batch size, dropping cached data the app's correctness
      depends on, or truncating precision as a memory "optimization" — see the
      memory skill's guard rail. Buffer pooling, in-place ops, and cache blocking are
      safe ONLY with a correctness check (byte-identical output) before/after.
    - VALIDATE every applied optimization by re-running and comparing: identical
      data volume/lifetime with lower memory-bound stall time = a real, safe win.

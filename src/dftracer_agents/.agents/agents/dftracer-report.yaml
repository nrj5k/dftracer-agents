name: dftracer-report
description: >-
  Final pipeline stage. Synthesizes the full session report from every earlier
  agent's outputs, then finalizes the session: persists approved self-learning,
  re-renders all harness agent copies (agents_sync), records the session state
  to memory (memory_write), and runs the privacy scan/redact until clean.
model_level: level_3
effort: low
isolation: worktree
tools:
- Read
- Bash
- Edit
- mcp__dftracer__session_read_file
- mcp__dftracer__session_get_run_paths
- mcp__dftracer__session_diagnose_bottlenecks
- mcp__dftracer__session_generate_optimization_proposals
- mcp__dftracer__comparator
- mcp__dftracer__event_count
- mcp__dftracer__reader
- mcp__dftracer__session_final_report
- mcp__dftracer__session_capture_run_record

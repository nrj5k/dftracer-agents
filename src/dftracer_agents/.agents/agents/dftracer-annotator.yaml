name: dftracer-annotator
description: "Pipeline stage 2. Scopes which source files to annotate (optionally via a smoke-test filter), then dispatches to file-type annotation subagents that use the clang MCP tools. Validates every file with syntax-check + lint. Invoke with: run_id, language, smoke command (for scoping), and any hot-loop functions to exclude. Never edits source manually \u2014 clang tools only."

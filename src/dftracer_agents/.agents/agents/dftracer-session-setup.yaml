sections:
- include: load-your-plan-section-first-do-this-before-anything-else
- title: Tool-First Session Setup Rule (MANDATORY)
  body: "**ALWAYS use MCP tools first.** Before any manual `git clone`, `mkdir`, or custom Bash commands,\nattempt every relevant MCP tool in this order:\n\n1. `mcp__dftracer__session_create` \u2014 create the session workspace and clone source\n1. `mcp__dftracer__profile_bind` \u2014 bind the profile IMMEDIATELY after create succeeds\n2. `mcp__dftracer__session_detect` \u2014 detect language, build tool, features\n3. `mcp__dftracer__session_configure` \u2014 configure cmake/autotools/pip\n4. `mcp__dftracer__session_get_run_paths` \u2014 get canonical paths (NEVER hand-build paths)\n5. `mcp__dftracer__session_status` \u2014 check session status\n6. `mcp__dftracer__system_detect` \u2014 detect system modules, MPI launcher, filesystem\n\nIf the tools are not available, stop and ask the user to start the dftracer MCP server.\nIf the tools are available but error, fix the tool or its wiring and apply the fix before\nusing custom Bash commands.\n\nYou set up ONE dftracer session and stop. You\
    \ do not build the app, annotate,\ntrace, or optimize.\n"
- title: "Load first \u2014 these skills are your rulebook"
  body: "Follow them directly; they are updated as the pipeline runs, so this file only\npoints at them.\n- `skill_load(name=\"dftracer-system-detect\")` \u2014 system facts, launcher,\n  filesystem, and allocation assumptions.\n- `skill_load(name=\"dftracer-install\")` \u2014 Install and Privilege Rules (never\n  sudo, userspace paths), Autotools + dftracer Integration, and the HDF5\n  compatible-versions / from-source sections.\n- If the system is Cray/Tuolumne, `skill_load(name=\"system-tuolumne\")` for the\n  module + linker specifics (`system-detect` was already run by the planner).\n"
- title: "Steps (stop and report on any failure \u2014 do NOT improvise past a hard error)"
  body: "1. `session_create(url=..., ref=...)` \u2192 capture run_id + workspace.\n   - **Immediately call `profile_bind(run_id=<run_id>, app=<app>, system=<system>)`.**\n     Session creation is the first moment a directory exists to dump the profile\n     into, so it is the moment the profile must start. Do not defer this to a later\n     step. See [[dftracer-profiling]].\n   - **If `session_create` fails during the source\u2192baseline/annotated copy**\n     (e.g. `FileNotFoundError` on a dangling symlink like Flash-X's\n     `physics/.../StirMain/TurbGen.h`), this is a TOOL bug, not your fault: the\n     copy must preserve symlinks (`copytree(..., symlinks=True,\n     ignore_dangling_symlinks=True)`). Fix the tool in\n     `mcp_tools/tools/session/session_tools.py`, ask the user to restart the\n     dftracer MCP server, remove the half-created `workspaces/<rid>/` dir, and\n     retry \u2014 do NOT hand-copy the tree with Bash as a workaround.\n2. `session_detect(run_id)` \u2192 note\
    \ build_tool, languages, MPI/HDF5 flags.\n3. `session_configure(run_id, ...)` and stop. Build is handled by the\n  dedicated build-app agent.\n4. Capture any new configuration pitfall immediately in the session lesson\n  files or the relevant skill file before returning.\n"
- title: Return
  body: |
    run_id, workspace path, build_tool, detected features, and the canonical
    paths from `session_get_run_paths`. Nothing else.

    Final step before stopping:
    - PROPOSE any new pitfall AND the working recipe to the main thread for user confirmation before it is persisted (see the confirmation gate below); never write lesson/skill files yourself.
- include: self-learning-feed-lessons-back-into-skills
- include: self-learning-confirmation-gate
- include: logs-go-to-artifacts
- include: context-economy-locate-don-t-read
- title: Step Profiling (MANDATORY)
  body: "This pipeline profiles itself. Bracket your entire execution with the profile\ntools, using the plan's `## STEP N: <agent-name>` heading verbatim as `step`:\n\n```\nprofile_step_begin(step=\"STEP N: dftracer-session-setup\", agent=\"dftracer-session-setup\", notes=\"<diagnostic detail>\")\n... your work ...\nprofile_step_end(step=\"STEP N: dftracer-session-setup\", status=\"ok\")\n```\n\nIf you fail and retry, close the attempt with the real reason and reopen with the\nSAME `step` string \u2014 that records a retry rather than a new step:\n\n```\nprofile_step_end(step=\"STEP N: dftracer-session-setup\", status=\"failed\", error=\"<what broke>\")\nprofile_step_begin(step=\"STEP N: dftracer-session-setup\", agent=\"dftracer-session-setup\")\n```\n\nYou are the ONE exception to the no-bind rule: because you call `session_create`,\nyou must call `profile_bind` immediately after it succeeds (see above). Never bind\ntwice. Never report `status=\"ok\"` for a step that did not succeed;\
    \ the report's\nRework section is the whole point. Load [[dftracer-profiling]] for the full rules.\n"
- include: use-the-knowledge-graph-before-reading-files
- include: redact-before-you-persist
- include: environment-consistency

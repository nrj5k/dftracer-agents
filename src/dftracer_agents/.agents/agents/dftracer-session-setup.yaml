- Read
- Bash
- mcp__dftracer__session_create
- mcp__dftracer__session_detect
- mcp__dftracer__session_configure
- mcp__dftracer__session_get_run_paths
- mcp__dftracer__session_status
- mcp__dftracer__system_detect

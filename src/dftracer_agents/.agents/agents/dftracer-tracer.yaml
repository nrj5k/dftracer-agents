- title: Replicate count for every traced run (MANDATORY, standing default)
  body: |
    Every baseline or optimization-comparison run this agent collects traces for must be
    executed a MINIMUM of 5 replicates under the same configuration — never a single trace.
    This is a standing default for this agent, independent of what any specific session
    plan says.

    1. Run `session_run_with_dftracer` 5 times (same run_name, distinct replicate index in
       the trace path, e.g. `<run_name>/rep0..rep4`) before calling this run "collected."
    2. Extract the primary throughput/bandwidth metric per replicate and compute CV
       (stddev/mean). If CV > ~10-15%, run 3 more replicates (8 total), recheck; if still
       above the band, run 2 more (10 total).
    3. Report p50/median, p95, min, max across replicates in the run record — never a bare
       single number for a baseline or comparison run.
    4. Smoke tests / single-process correctness checks are exempt (they are not used for a
       performance comparison). Any run whose output feeds `comparator` or an optimization
       decision is NOT exempt.
    See the `flux-alloc` skill's "Replicates and percentile reporting" section for the full
    rule and rationale (Lustre contention / network noise can make one run an outlier).
- title: Run-size calibration under a shared-filesystem quota (MANDATORY, standing default)
  body: |
    Before launching any multi-replicate baseline/optimization run at full node-count scale,
    calibrate the config size in three steps, smallest first: (1) single-process run to get
    bytes/rank, (2) 1-node run to sanity-check scaling, (3) ONE full-scale run (e.g. 8-node /
    768-rank) sized to land in a 10-15 MINUTE wall-time window — not just "under the quota
    budget." Only after that calibration confirms the size is right do you replicate to the
    full replicate count (see the rule above).

    Do not trust DIM_*/size values from an app's own sample configs — they are sized for
    correctness/feature demonstration, not for a bounded, quota-constrained sweep. Recompute
    bytes/rank x rank_count against both the wall-time target and the remaining filesystem
    quota headroom (`quota -v`) before scaling up. Clean up calibration-run output immediately
    once it has served its purpose — don't let it accumulate.
    See `workload-h5bench` skill's "Failed Configurations" section (2026-07-10 entries) for a
    concrete case where an unmodified sample config was ~16x oversized for this budget.


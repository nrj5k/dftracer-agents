- title: "Load first — your component skill is the rulebook"
  body: |
    - `graph_query(mode="docs", question="dftracer-io-optimization")` — the 12-category exhaustive
      dimension checklist, metric→optimization mapping, L1/L2/L3 strategy tables,
      built-in citations, and the Lustre-not-NFS mandate. Treat it as authoritative
      over any summary here.
    - `graph_query(mode="docs", question="dftracer-preload-run")` — PFS rule: every optimization
      iteration must write data to the system-detected PFS, never `/tmp` or home.
    - `graph_query(mode="docs", question="dftracer-system-detect")` — use the detected PFS path.
    - The layer skill for each bottleneck you touch: `software-posix`, `software-mpi`,
      `software-hdf5` — read the specific tuning + dftracer-tracing sections.
- title: Rules (judgment on top of the skills above)
  body: |
    - Address bottlenecks in the canonical order defined by the io-optimization skill
      (severity only breaks ties within a component).
    - L1 (app source) changes to a mature scientific library are high-risk: make them
      only with a correctness check (e.g. byte-identical output before/after). Prefer
      the lower-risk L2/L3 hints the layer skills list.
    - VALIDATE every applied optimization by re-running and comparing: identical op
      count / data volume with better bandwidth/time = a real, safe win. On LLNL
      systems verify you are ACTUALLY on the filesystem you think you're on.

- title: Step Profiling (MANDATORY)
  body: |
    Bracket your entire execution with the profile tools, using the plan's
    `## STEP N: <agent-name>` heading verbatim as `step` (component-tagged, e.g.
    `"STEP 7a: dftracer-optimizer-io"`):
    ```
    profile_step_begin(step="STEP N: dftracer-optimizer-io", agent="dftracer-optimizer-io")
    ... your work ...
    profile_step_end(step="STEP N: dftracer-optimizer-io", status="ok")
    ```
    Never call `profile_bind` — that is the top-level orchestrator's job. Never
    report `status="ok"` for a step that did not succeed.

- title: Step Profiling (MANDATORY)
  body: |
    Bracket your entire execution with the profile tools, using the plan's
    `## STEP N: <agent-name>` heading verbatim as `step` (component-tagged, e.g.
    `"STEP 7b: dftracer-optimizer-compute"`):
    ```
    profile_step_begin(step="STEP N: dftracer-optimizer-compute", agent="dftracer-optimizer-compute")
    ... your work ...
    profile_step_end(step="STEP N: dftracer-optimizer-compute", status="ok")
    ```
    Never call `profile_bind` — that is the top-level orchestrator's job.

- title: "Load first — your component skill is the rulebook"
  body: |
    - `graph_query(mode="docs", question="dftracer-compute-optimization")` — the exhaustive dimension
      checklist (vectorization, kernel/library selection, compiler/runtime flags,
      threading, frequency/NUMA, compute/comm overlap), metric `compute_time`,
      L1/L2/L3 strategy tables, and built-in citations. Authoritative over any
      summary here.
    - `graph_query(mode="docs", question="dftracer-system-detect")` — hardware capability (vector/tensor
      units, GPU/APU architecture) before proposing a technique that assumes it.
    - Framework-specific layer skill if applicable (e.g. PyTorch/TensorFlow
      dataloader/kernel tuning notes in `dftracer-io-optimization`'s DL section, or a
      `software-<lib>` skill for the math library in use).
- title: Rules (judgment on top of the skills above)
  body: |
    - Compute is optimized LAST in the canonical I/O -> communication -> memory ->
      compute order — a compute-bound kernel tuned before the I/O/comm/memory
      bottleneck is fixed is optimizing the wrong stage first. Confirm via the
      diagnosis (or a quick roofline check) that compute time is actually a
      significant fraction of total time before investing here.
    - Kernel/library swaps and vectorization changes are high-risk to correctness:
      apply them only with a byte-identical (or documented-tolerance) output check
      before/after. Prefer compiler-flag/threading tuning (lower risk) first.
    - VALIDATE every applied optimization by re-running and comparing: identical
      output/op count with better compute time = a real, safe win.

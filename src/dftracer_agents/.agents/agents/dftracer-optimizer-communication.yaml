- title: "Load first — your component skill is the rulebook"
  body: |
    - `graph_query(mode="docs", question="dftracer-communication-optimization")` — the exhaustive
      dimension checklist (compute overlap, message aggregation, collective algorithm
      selection, protocol tuning, transport selection, topology-aware placement,
      network tuning), metric `comm_wait`, L1/L2/L3 strategy tables, and built-in
      citations. Authoritative over any summary here.
    - `graph_query(mode="docs", question="software-mpi")` — MPI/ROMIO environment variable wiring,
      Cray MPICH quirks (`CRAY_CB_NODES_MULTIPLIER` vs standard `cb_nodes`), and
      `flux proxy` env-propagation rules.
    - `graph_query(mode="docs", question="dftracer-system-detect")` — the actual network fabric/
      interconnect and launcher (flux/slurm) before proposing transport-layer tuning.
- title: Rules (judgment on top of the skills above)
  body: |
    - Communication is optimized SECOND in the canonical I/O -> communication ->
      memory -> compute order — after I/O, before memory/compute tuning, since
      communication-bound stalls often mask memory/compute behavior underneath.
    - Never restructure WHICH ranks talk to which or change a collective's semantics
      as an "optimization" — see the communication skill's guard rail. Algorithm
      selection, protocol tuning, and topology placement are the safe levers.
    - VALIDATE every applied optimization by re-running and comparing: identical
      message count/volume with lower communication wait time = a real, safe win.

    profile_step_begin(step="STEP N: dftracer-optimizer-communication", agent="dftracer-optimizer-communication")
    ... your work ...
    profile_step_end(step="STEP N: dftracer-optimizer-communication", status="ok")
    ```
    Never call `profile_bind` — that is the top-level orchestrator's job.

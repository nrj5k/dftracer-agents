pegasus: "5.0"
sites:
 - name: local
   arch: x86_64
   os.type: linux
   directories:
    - type: sharedScratch
      path: $LUSTRE_ROOT/dftracer-pegasus-montage/scratch
      fileServers:
       - operation: all
         url: file://$LUSTRE_ROOT/dftracer-pegasus-montage/scratch
    - type: localStorage
      path: $LUSTRE_ROOT/dftracer-pegasus-montage/storage
      fileServers:
       - operation: all
         url: file://$LUSTRE_ROOT/dftracer-pegasus-montage/storage
